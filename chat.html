<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Leazo Chat Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; }
    .anton { font-family: 'Anton', sans-serif; letter-spacing: 1.5px; }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100dvh; }
    .chat-layout { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 100%; max-width: 380px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; background: white; flex-shrink: 0; }
    .sidebar.hidden-mobile { display: none; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; background: #f9fafb; }
    .chat-panel.hidden-mobile { display: none; }

    /* Messages */
    .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg-inbound { align-self: flex-start; max-width: 75%; background: white; border: 1px solid #e5e7eb; border-radius: 0 16px 16px 16px; padding: 10px 14px; }
    .msg-outbound { align-self: flex-end; max-width: 75%; background: #393be5; color: white; border-radius: 16px 16px 0 16px; padding: 10px 14px; }

    /* Input */
    .chat-input-bar { padding: 12px 16px; border-top: 1px solid #e5e7eb; background: white; display: flex; gap: 10px; align-items: flex-end; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    .chat-input { flex: 1; border: 2px solid #e5e7eb; border-radius: 24px; padding: 10px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; max-height: 120px; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: #393be5; }

    /* Conversation list */
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background 0.15s; display: flex; gap: 12px; align-items: center; }
    .conv-item:hover { background: #f9fafb; }
    .conv-item.active { background: #eff6ff; border-right: 3px solid #393be5; }
    .conv-avatar { width: 44px; height: 44px; border-radius: 50%; background: #FFD345; border: 2px solid black; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .unread-badge { background: #393be5; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* Mobile back button */
    .mobile-back { display: none; }

    @media (max-width: 768px) {
      .sidebar { max-width: 100%; }
      .mobile-back { display: flex; }
      .sidebar.hidden-mobile { display: none; }
      .chat-panel.hidden-mobile { display: none; }
      .sidebar:not(.hidden-mobile) { display: flex; width: 100%; }
      .chat-panel:not(.hidden-mobile) { display: flex; width: 100%; }
    }
    @media (min-width: 769px) {
      .sidebar { display: flex !important; }
      .chat-panel { display: flex !important; }
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-sent { background: #9ca3af; }
    .status-delivered { background: #60a5fa; }
    .status-read { background: #34d399; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="h-screen flex items-center justify-center bg-[#FFD345] px-4">
  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <h1 class="anton text-4xl italic text-black" style="letter-spacing:4px;">LEAZO</h1>
      <p class="text-xs font-bold tracking-widest uppercase text-gray-400 mt-1">Chat Inbox</p>
    </div>
    <input id="passInput" type="password" placeholder="Password"
      class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#393be5]"/>
    <button onclick="checkLogin()"
      class="w-full bg-[#393be5] text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition text-sm">
      Login →
    </button>
    <p id="loginErr" class="text-red-500 text-xs text-center mt-3 hidden">Wrong password</p>
  </div>
</div>

<!-- CHAT APP -->
<div id="chatApp" class="app hidden">

  <!-- Top header -->
  <div class="bg-[#FFD345] border-b-4 border-[#393be5] px-4 py-3 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3">
      <span class="anton text-xl italic" style="letter-spacing:3px;">LEAZO</span>
      <span class="text-xs font-bold bg-[#393be5] text-white px-2 py-0.5 rounded-full">INBOX</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="connectionStatus" class="text-xs font-bold text-gray-600">Connecting...</span>
      <button onclick="logout()" class="text-xs text-gray-600 underline">Logout</button>
    </div>
  </div>

  <div class="chat-layout">

    <!-- SIDEBAR — conversation list -->
    <div class="sidebar" id="sidebar">

      <!-- Search & filter -->
      <div class="px-4 py-3 border-b border-gray-100">
        <input id="searchConv" type="text" placeholder="Search conversations..."
          class="w-full bg-gray-100 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#393be5]"
          oninput="filterConversations()"/>
        <div class="flex gap-2 mt-2">
          <button onclick="setConvFilter('all')" class="conv-filter-btn active flex-1 text-xs font-bold py-1.5 rounded-lg bg-[#393be5] text-white transition" data-filter="all">All</button>
          <button onclick="setConvFilter('unread')" class="conv-filter-btn flex-1 text-xs font-bold py-1.5 rounded-lg bg-gray-100 text-gray-600 transition" data-filter="unread">Unread</button>
          <button onclick="setConvFilter('open')" class="conv-filter-btn flex-1 text-xs font-bold py-1.5 rounded-lg bg-gray-100 text-gray-600 transition" data-filter="open">Open</button>
          <button onclick="setConvFilter('resolved')" class="conv-filter-btn flex-1 text-xs font-bold py-1.5 rounded-lg bg-gray-100 text-gray-600 transition" data-filter="resolved">Done</button>
        </div>
      </div>

      <!-- Conversation list -->
      <div class="conv-list" id="convList">
        <div class="text-center py-12 text-gray-400">
          <p class="text-3xl mb-2">💬</p>
          <p class="text-sm">Loading conversations...</p>
        </div>
      </div>

    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel hidden-mobile" id="chatPanel">

      <!-- Empty state -->
      <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-gray-400">
        <p class="text-6xl mb-4">💬</p>
        <p class="font-bold text-gray-600">Select a conversation</p>
        <p class="text-sm mt-1">Choose from the left to start chatting</p>
      </div>

      <!-- Active chat -->
      <div id="activeChat" class="hidden flex-col h-full">

        <!-- Chat header -->
        <div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 flex-shrink-0">
          <button class="mobile-back text-xl text-gray-600 mr-1" onclick="closeChatMobile()">←</button>
          <div id="chatAvatar" class="conv-avatar text-base">?</div>
          <div class="flex-1 min-w-0">
            <p id="chatName" class="font-bold text-gray-900 truncate">—</p>
            <p id="chatPhone" class="text-xs text-gray-400">—</p>
          </div>
          <div class="flex gap-2">
            <a id="chatCall" href="#" class="w-9 h-9 bg-[#FFD345] border-2 border-black rounded-xl flex items-center justify-center text-base">📞</a>
            <a id="chatWA" href="#" target="_blank" class="w-9 h-9 bg-[#25D366] rounded-xl flex items-center justify-center text-base text-white">💬</a>
            <button id="resolveBtn" onclick="toggleResolve()" class="w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center text-base">✓</button>
          </div>
        </div>

        <!-- Booking info bar -->
        <div id="bookingBar" class="hidden bg-blue-50 border-b border-blue-100 px-4 py-2">
          <p class="text-xs font-bold text-blue-700" id="bookingBarText"></p>
        </div>

        <!-- Messages -->
        <div class="messages-container" id="messagesContainer">
        </div>

        <!-- Quick replies -->
        <div class="px-4 py-2 flex gap-2 overflow-x-auto flex-shrink-0 border-t border-gray-100 bg-white">
          <button onclick="quickReply('Hi! Your PS5 will be delivered soon. 🎮')" class="quick-reply-btn text-xs bg-gray-100 text-gray-700 px-3 py-1.5 rounded-full whitespace-nowrap hover:bg-[#FFD345] transition font-medium flex-shrink-0">PS5 on way 🚗</button>
          <button onclick="quickReply('Your PS5 has been delivered! Enjoy gaming. 🎮')" class="quick-reply-btn text-xs bg-gray-100 text-gray-700 px-3 py-1.5 rounded-full whitespace-nowrap hover:bg-[#FFD345] transition font-medium flex-shrink-0">Delivered ✅</button>
          <button onclick="quickReply('We will be there to pick up the PS5 soon.')" class="quick-reply-btn text-xs bg-gray-100 text-gray-700 px-3 py-1.5 rounded-full whitespace-nowrap hover:bg-[#FFD345] transition font-medium flex-shrink-0">Pickup soon</button>
          <button onclick="quickReply('Thank you for choosing Leazo! Book again at leazo.in 🎮')" class="quick-reply-btn text-xs bg-gray-100 text-gray-700 px-3 py-1.5 rounded-full whitespace-nowrap hover:bg-[#FFD345] transition font-medium flex-shrink-0">Thank you</button>
          <button onclick="quickReply('Sorry for the delay. We will reach you shortly!')" class="quick-reply-btn text-xs bg-gray-100 text-gray-700 px-3 py-1.5 rounded-full whitespace-nowrap hover:bg-[#FFD345] transition font-medium flex-shrink-0">Sorry delay</button>
        </div>

        <!-- Input bar -->
        <div class="chat-input-bar">
          <textarea id="msgInput" class="chat-input" placeholder="Type a message..." rows="1"
            oninput="autoResize(this)"
            onkeydown="handleKeydown(event)"></textarea>
          <button onclick="sendMessage()"
            class="w-11 h-11 bg-[#393be5] text-white rounded-full flex items-center justify-center text-xl hover:bg-blue-700 active:scale-95 transition flex-shrink-0">
            ➤
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://rohybhpktpfmeashdlzz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvaHliaHBrdHBmbWVhc2hkbHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzcwMTYsImV4cCI6MjA5MzMxMzAxNn0.NhM9DnXOl_7h3NHh1r78cPNvbogO_qOEhPfQauyKHJE';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CHAT_PASSWORD = 'leazochat2025'; // ← change this
  const ALLOWED_PASSWORDS = ['leazochat2025', 'leazooperator2025']; // admin + operator

  let allConversations = [];
  let currentConv = null;
  let currentFilter = 'all';
  let realtimeChannel = null;

  // ── AUTH ──
  function checkLogin() {
    const pass = document.getElementById('passInput').value;
    if (ALLOWED_PASSWORDS.includes(pass)) {
      sessionStorage.setItem('chat_auth', pass);
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('chatApp').classList.remove('hidden');
      initChat();
    } else {
      document.getElementById('loginErr').classList.remove('hidden');
    }
  }
  document.getElementById('passInput')?.addEventListener('keydown', e => { if(e.key==='Enter') checkLogin(); });

  if (sessionStorage.getItem('chat_auth')) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('chatApp').classList.remove('hidden');
    initChat();
  }

  function logout() { sessionStorage.removeItem('chat_auth'); location.reload(); }

  // ── INIT ──
  async function initChat() {
    await loadConversations();
    setupRealtime();
  }

  // ── LOAD CONVERSATIONS ──
  async function loadConversations() {
    const { data, error } = await db
      .from('conversations')
      .select('*')
      .order('last_message_time', { ascending: false });

    if (error) { console.error(error); return; }
    allConversations = data || [];
    document.getElementById('connectionStatus').textContent = `${allConversations.length} chats`;
    renderConversations();
  }

  // ── REALTIME ──
  function setupRealtime() {
    // Real-time subscription
    realtimeChannel = db
      .channel('leazo-chat-realtime')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'conversations',
      }, async () => {
        await loadConversations();
      })
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
      }, (payload) => {
        if (currentConv && payload.new.conversation_id === currentConv.id) {
          appendMessage(payload.new);
          // Mark as read immediately
          db.from('conversations').update({ unread_count: 0 }).eq('id', currentConv.id);
        }
        // Always refresh conversation list for unread counts
        loadConversations();
      })
      .subscribe((status) => {
        console.log('Realtime status:', status);
        const el = document.getElementById('connectionStatus');
        if (status === 'SUBSCRIBED') {
          el.textContent = '🟢 Live';
          // Clear polling if realtime works
          if (window._pollInterval) {
            clearInterval(window._pollInterval);
            window._pollInterval = null;
          }
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          el.textContent = '🟡 Polling';
          startPolling();
        } else {
          el.textContent = '⏳ Connecting...';
        }
      });

    // Start polling as immediate fallback (every 5 seconds)
    // Will be cleared if realtime connects successfully
    startPolling();
  }

  function startPolling() {
    if (window._pollInterval) return; // already polling
    window._pollInterval = setInterval(async () => {
      await loadConversations();
      if (currentConv) {
        // Check for new messages in current conversation
        const { data } = await db
          .from('messages')
          .select('*')
          .eq('conversation_id', currentConv.id)
          .order('sent_at', { ascending: true });

        if (data) {
          const container = document.getElementById('messagesContainer');
          const currentCount = container.children.length;
          if (data.length > currentCount) {
            // New messages — re-render
            container.innerHTML = '';
            data.forEach(msg => appendMessage(msg, false));
            container.scrollTop = container.scrollHeight;
          }
        }
      }
    }, 5000); // poll every 5 seconds
  }

  // ── FILTER ──
  function setConvFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.conv-filter-btn').forEach(btn => {
      const active = btn.dataset.filter === filter;
      btn.className = `conv-filter-btn flex-1 text-xs font-bold py-1.5 rounded-lg transition ${active ? 'bg-[#393be5] text-white' : 'bg-gray-100 text-gray-600'}`;
    });
    renderConversations();
  }

  function filterConversations() { renderConversations(); }

  function getFilteredConvs() {
    const search = document.getElementById('searchConv').value.toLowerCase().trim();
    return allConversations.filter(c => {
      if (search && !c.customer_name?.toLowerCase().includes(search) && !c.customer_phone?.includes(search)) return false;
      if (currentFilter === 'unread' && !c.unread_count) return false;
      if (currentFilter === 'open' && c.resolved) return false;
      if (currentFilter === 'resolved' && !c.resolved) return false;
      return true;
    });
  }

  // ── RENDER CONVERSATIONS ──
  function renderConversations() {
    const list = document.getElementById('convList');
    const filtered = getFilteredConvs();

    if (!filtered.length) {
      list.innerHTML = `<div class="text-center py-12 text-gray-400"><p class="text-3xl mb-2">💬</p><p class="text-sm">No conversations</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(c => {
      const time = c.last_message_time
        ? new Date(c.last_message_time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
        : '';
      const isActive = currentConv?.id === c.id;
      return `
        <div class="conv-item ${isActive ? 'active' : ''} ${c.resolved ? 'opacity-60' : ''}"
          onclick="openConversation('${c.id}')">
          <div class="conv-avatar">${c.customer_name?.charAt(0)?.toUpperCase() || '?'}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between">
              <p class="font-bold text-gray-900 text-sm truncate">${c.customer_name || c.customer_phone}</p>
              <p class="text-[10px] text-gray-400 flex-shrink-0 ml-2">${time}</p>
            </div>
            <div class="flex items-center justify-between mt-0.5">
              <p class="text-xs text-gray-500 truncate flex-1">${c.last_message || '—'}</p>
              <div class="flex items-center gap-1 ml-2 flex-shrink-0">
                ${c.resolved ? '<span class="text-[10px] text-green-500 font-bold">✓</span>' : ''}
                ${c.unread_count ? `<span class="unread-badge">${c.unread_count}</span>` : ''}
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── OPEN CONVERSATION ──
  async function openConversation(convId) {
    const conv = allConversations.find(c => c.id === convId);
    if (!conv) return;

    currentConv = conv;

    // Mobile — hide sidebar, show chat
    document.getElementById('sidebar').classList.add('hidden-mobile');
    document.getElementById('chatPanel').classList.remove('hidden-mobile');

    // Update UI
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('activeChat').classList.remove('hidden');
    document.getElementById('activeChat').classList.add('flex');

    document.getElementById('chatAvatar').textContent = conv.customer_name?.charAt(0)?.toUpperCase() || '?';
    document.getElementById('chatName').textContent = conv.customer_name || conv.customer_phone;
    document.getElementById('chatPhone').textContent = `+91 ${conv.customer_phone}`;
    document.getElementById('chatCall').href = `tel:${conv.customer_phone}`;
    document.getElementById('chatWA').href = `https://wa.me/91${conv.customer_phone}`;
    document.getElementById('resolveBtn').title = conv.resolved ? 'Mark as open' : 'Mark as resolved';
    document.getElementById('resolveBtn').style.background = conv.resolved ? '#d1fae5' : '#f3f4f6';

    // Check booking
    const { data: booking } = await db
      .from('bookings')
      .select('*')
      .eq('phone', conv.customer_phone)
      .order('created_at', { ascending: false })
      .limit(1)
      .single();

    const bookingBar = document.getElementById('bookingBar');
    if (booking) {
      bookingBar.classList.remove('hidden');
      document.getElementById('bookingBarText').textContent =
        `📦 ${booking.plan} · ${booking.booking_date} · ₹${booking.total_amount} · ${booking.operator_status} · Ref: ${booking.reference_number}`;
    } else {
      bookingBar.classList.add('hidden');
    }

    // Mark as read
    await db.from('conversations').update({ unread_count: 0 }).eq('id', convId);

    // Load messages
    await loadMessages(convId);

    // Update active state
    renderConversations();
  }

  // ── LOAD MESSAGES ──
  async function loadMessages(convId) {
    const { data, error } = await db
      .from('messages')
      .select('*')
      .eq('conversation_id', convId)
      .order('sent_at', { ascending: true });

    if (error) { console.error(error); return; }

    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';

    (data || []).forEach(msg => appendMessage(msg, false));
    container.scrollTop = container.scrollHeight;
  }

  // ── APPEND MESSAGE ──
  function appendMessage(msg, scroll = true) {
    const container = document.getElementById('messagesContainer');
    const isOutbound = msg.direction === 'outbound';
    const time = new Date(msg.sent_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

    const div = document.createElement('div');
    div.className = `fade-up ${isOutbound ? 'msg-outbound' : 'msg-inbound'}`;
    div.innerHTML = `
      <p class="text-sm leading-relaxed" style="white-space:pre-wrap">${escapeHtml(msg.message)}</p>
      <div class="flex items-center gap-1 mt-1 ${isOutbound ? 'justify-end' : ''}">
        <p class="text-[10px] ${isOutbound ? 'text-blue-200' : 'text-gray-400'}">${time}</p>
        ${isOutbound ? `<span class="status-dot status-${msg.status || 'sent'}"></span>` : ''}
      </div>`;
    container.appendChild(div);

    if (scroll) container.scrollTop = container.scrollHeight;
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    if (!currentConv) return;
    const input = document.getElementById('msgInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = 'auto';

    const response = await fetch(
      'https://rohybhpktpfmeashdlzz.supabase.co/functions/v1/send-whatsapp-reply',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          conversation_id: currentConv.id,
          to: currentConv.wa_contact_id || `91${currentConv.customer_phone}`,
          message
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      alert('Failed to send: ' + (err.error || 'Unknown error'));
    }
  }

  function quickReply(msg) {
    document.getElementById('msgInput').value = msg;
    document.getElementById('msgInput').focus();
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── RESOLVE ──
  async function toggleResolve() {
    if (!currentConv) return;
    const newState = !currentConv.resolved;
    await db.from('conversations').update({ resolved: newState }).eq('id', currentConv.id);
    currentConv.resolved = newState;
    document.getElementById('resolveBtn').style.background = newState ? '#d1fae5' : '#f3f4f6';
    await loadConversations();
  }

  // ── MOBILE BACK ──
  function closeChatMobile() {
    document.getElementById('sidebar').classList.remove('hidden-mobile');
    document.getElementById('chatPanel').classList.add('hidden-mobile');
    currentConv = null;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
